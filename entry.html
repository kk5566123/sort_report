<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>排序教學入口</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: linear-gradient(135deg, #f6ebdb 0%, #efe3d1 100%);
			font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
			color: #1c2430;
		}

		.card {
			width: min(520px, calc(100% - 32px));
			padding: 32px;
			border-radius: 24px;
			background: rgba(255, 250, 242, 0.9);
			box-shadow: 0 18px 40px rgba(76, 49, 27, 0.14);
			text-align: center;
		}

		h1 {
			margin: 0 0 14px;
			font-size: 2rem;
		}

		p {
			margin: 0 0 22px;
			line-height: 1.7;
			color: #566273;
		}

		a {
			display: inline-block;
			padding: 14px 24px;
			border-radius: 999px;
			background: #d95d39;
			color: #fff;
			text-decoration: none;
			font-weight: 700;
			transition: transform 0.18s ease, box-shadow 0.18s ease;
		}

		a:hover {
			transform: translateY(-2px);
			box-shadow: 0 12px 24px rgba(217, 93, 57, 0.24);
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>排序教學入口頁</h1>
		<p>按下面的按鈕，就可以進入氣泡排序 Bubble Sort 的教學與動畫展示頁面。</p>
		<a href="bubble-sort.html">前往 Bubble Sort 頁面</a>
	</main>
</body>
</html>
